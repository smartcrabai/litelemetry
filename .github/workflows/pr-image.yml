name: PR Image

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-image-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-push:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=pr-${{ github.event.pull_request.number }}
            type=gha,scope=main
          cache-to: type=gha,mode=max,scope=pr-${{ github.event.pull_request.number }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete PR image tag
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "$OWNER_TYPE" = "Organization" ]; then
            BASE="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            BASE="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          VERSION_ID=$(gh api --paginate "$BASE" \
            | jq -r --arg t "$PR_TAG" '.[] | select(.metadata.container.tags | index($t)) | .id' \
            | head -n1)

          if [ -n "$VERSION_ID" ]; then
            gh api -X DELETE "${BASE}/${VERSION_ID}"
            echo "Deleted version ${VERSION_ID} (tag ${PR_TAG})"
          else
            echo "Tag ${PR_TAG} not found, nothing to delete"
          fi
