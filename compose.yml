services:
  redis:
    image: redis:8-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "${LITELEMETRY_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:18-alpine@sha256:d164db0c6b4fc00e438f160b4480f207f3f837cf60f781c61670af4ef71a8062
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: litelemetry
    ports:
      - "${LITELEMETRY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litelemetry"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-seeder:
    image: redis:8-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./docker/redis:/seed:ro
    entrypoint: ["sh", "/seed/seed.sh"]
