services:
  redis:
    image: redis:8-alpine
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "${LITELEMETRY_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: litelemetry
    ports:
      - "${LITELEMETRY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litelemetry"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-seeder:
    image: redis:8-alpine
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./docker/redis:/seed:ro
    entrypoint: ["sh", "/seed/seed.sh"]

  app:
    build:
      context: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-seeder:
        condition: service_completed_successfully
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/litelemetry
      HTTP_PORT: "8080"
      VIEWER_RUNTIME_POLL_MS: "1000"
      RUST_LOG: litelemetry=info
    ports:
      - "${LITELEMETRY_HTTP_PORT:-8080}:8080"
